<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#070604" />
  <title>PARISI Tapware Finder</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app" id="app">
    <section class="screen home" id="homeScreen">
      <div class="brandBlock">
        <div class="brandName">PARISI</div>
        <div class="brandSub">TAPWARE FINDER</div>
      </div>

      <div class="searchBox homeSearch">
        <span class="searchIcon">⌕</span>
        <input id="homeSearch" type="search" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="Search code, name, location or shelf" />
        <button id="homeGo" class="searchGo" aria-label="Search">→</button>
      </div>
      <div id="homeSuggestions" class="suggestions"></div>

      <button id="ocrBtn" class="ocrLine" type="button">OCR SCAN</button>
      <input id="ocrInput" type="file" accept="image/*" capture="environment" hidden />
      <div id="ocrStatus" class="ocrStatus"></div>

      <div class="workspaceLabel">WORKSPACE</div>
      <button id="openBts" class="workspace" type="button">
        <div>
          <div class="workspaceTitle">BACK TO STOCK</div>
          <div class="workspaceText">Group queued items by location</div>
        </div>
        <span>→</span>
      </button>

      <footer>Found an error or missing info? Please let <strong>Thiago</strong> know.</footer>
    </section>

    <section class="screen result hidden" id="resultScreen">
      <header class="topbar">
        <button id="backHome" class="backBtn" type="button">←</button>
        <div class="miniBrand">PARISI</div>
        <div class="searchBox miniSearch">
          <span class="searchIcon">⌕</span>
          <input id="resultSearch" type="search" autocomplete="off" autocapitalize="characters" spellcheck="false" />
          <button id="resultGo" class="searchGo" aria-label="Search">→</button>
        </div>
      </header>
      <div id="resultSuggestions" class="suggestions compact"></div>
      <div class="notice">ⓘ Found an error or missing info? Please let <strong>Thiago</strong> know.</div>
      <div id="foundMeta" class="foundMeta">0 PRODUCTS FOUND</div>
      <div id="resultContent"></div>
    </section>

    <section class="screen bts hidden" id="btsScreen">
      <header class="topbar only">
        <button id="backFromBts" class="backBtn" type="button">←</button>
        <div class="miniBrand">PARISI</div>
      </header>
      <div class="sectionTitle">BACK TO STOCK</div>
      <div class="btsActions">
        <button id="clearBts" type="button">CLEAR LIST</button>
        <button id="exportBts" type="button">EXPORT CSV</button>
      </div>
      <div id="btsContent" class="btsContent"></div>
      <footer>Found an error or missing info? Please let <strong>Thiago</strong> know.</footer>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}</script>
</body>
</html>
