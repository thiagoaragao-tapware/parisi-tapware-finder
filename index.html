<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parisi Tapware Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <main class="shell">
    <section class="hero">
      <div class="brand-block">
        <div class="brand-line"></div>
        <p class="eyebrow">PARISI</p>
        <h1>BATHWARE</h1>
        <p class="subline">Tapware location system</p>
      </div>

      <div class="search-card">
        <div class="search-bar">
          <span class="icon">⌕</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="Digite o código do produto" autofocus />
          <button id="clearBtn" aria-label="Clear search">×</button>
        </div>
        <div id="suggestions" class="suggestions hidden"></div>
      </div>
    </section>

    <section id="featured" class="featured empty-state">
      <div class="empty-copy">
        <span class="small-gold">Ready</span>
        <h2>Procure um item</h2>
        <p>Digite código, nome, barcode, location ou shelf. A localização principal aparece aqui imediatamente.</p>
      </div>
    </section>

    <section class="quick-actions">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="withLocation">Location OK</button>
      <button class="pill" data-filter="withoutLocation">No Location</button>
      <button class="pill" data-filter="withShelf">Shelf OK</button>
      <button class="pill" data-filter="withoutShelf">No Shelf</button>
    </section>

    <section class="info-row">
      <div class="mini-panel"><span>Total</span><strong id="totalCount">—</strong></div>
      <div class="mini-panel"><span>Results</span><strong id="resultCount">—</strong></div>
      <div class="mini-panel"><span>Recent</span><strong id="recentChip">—</strong></div>
    </section>

    <section id="results" class="results"></section>
  </main>

  <dialog id="detailDialog">
    <div class="modal">
      <button id="closeDialog" class="close">×</button>
      <div id="detailContent"></div>
    </div>
  </dialog>

  <div id="toast"></div>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
